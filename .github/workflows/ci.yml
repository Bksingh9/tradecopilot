name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend (pytest + compileall)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      JWT_SECRET: ci-secret-please-ignore
      AI_COACH_BACKEND: fake
      DATABASE_URL: sqlite:///./tradecopilot.db
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install scikit-learn==1.4.2 joblib==1.4.2
      - name: Generate Fernet key
        run: |
          echo "SECRETS_FERNET_KEY=$(python -c 'from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())')" >> $GITHUB_ENV
      - name: Compile all
        run: python -m compileall -q app tests
      - name: Run tests
        run: python -m pytest -q

  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci || npm install
      - name: Typecheck
        run: npx tsc -b --force
      - name: Build
        run: npx vite build

  llm_proxy:
    name: LLM Proxy (compile)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: llm_proxy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Compile
        run: python -m compileall -q main.py

  e2e_api_smoke:
    name: E2E API smoke (live deploy)
    runs-on: ubuntu-latest
    needs: [backend, frontend]                 # only run if static checks pass
    defaults:
      run:
        working-directory: e2e
    env:
      WEB_BASE_URL: ${{ vars.WEB_BASE_URL || 'https://tradecopilot-web.onrender.com' }}
      API_BASE_URL: ${{ vars.API_BASE_URL || 'https://tradecopilot-api.onrender.com' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: e2e/package.json
      - name: Install
        run: npm install
      - name: Run API contract smoke
        run: npm run test:api -- --reporter=github
      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-api
          path: e2e/playwright-report/
          retention-days: 7
