server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # SPA routing — anything that isn't a file falls back to index.html.
    location / {
        try_files $uri /index.html;
    }

    # Long-cache static assets (Vite hashes filenames).
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Health
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
