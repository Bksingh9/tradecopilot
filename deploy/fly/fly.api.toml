# fly deploy --config deploy/fly/fly.api.toml

app = "tradecopilot-api"
primary_region = "iad"

[build]
  dockerfile = "../../backend/Dockerfile"
  build-target = ""

[env]
  APP_ENV = "prod"
  AI_COACH_BACKEND = "fake"
  KILL_SWITCH_HARD_DAILY_LOSS_PCT = "5.0"
  KILL_SWITCH_HARD_MAX_OPEN_POSITIONS = "20"
  VECTOR_BACKEND = "memory"

[processes]
  app = "uvicorn app.main:app --host 0.0.0.0 --port 8000 --proxy-headers --forwarded-allow-ips '*'"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health/core"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"

[mounts]
  source = "tc_models"
  destination = "/app/models"
