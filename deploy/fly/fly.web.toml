# Fly.io app: TradeCopilot frontend (Vite build → nginx).
#
# fly launch --copy-config --config deploy/fly/fly.web.toml --no-deploy
# fly deploy --config deploy/fly/fly.web.toml \
#     --build-arg VITE_API_BASE=https://tradecopilot-api.fly.dev

app = "tradecopilot-web"
primary_region = "iad"

[build]
  dockerfile = "../../frontend/Dockerfile"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "5s"
    method = "GET"
    path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
