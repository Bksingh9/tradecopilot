# Render Blueprint — free-tier stand-up.
#
# Resources (all free plans):
#   - Postgres:   free (auto-deletes after 30 days unless upgraded)
#   - Key Value:  free
#   - API:        free web service (sleeps after 15 min idle)
#   - Web:        free static site
#
# The AI worker is intentionally NOT included on free tier — Render does not
# offer a free always-on worker. The backend's FakeCoach handles AI calls
# synchronously, so the app remains fully functional. Add the worker on a
# paid plan once you're ready to wire a real LLM (see deploy/render/README.md).

databases:
  - name: tradecopilot-db
    plan: free
    databaseName: tradecopilot
    user: tc

services:
  # Redis-protocol key-value store (Render's managed Redis).
  - type: keyvalue
    name: tradecopilot-redis
    plan: free
    ipAllowList: []          # Internal access only.

  # FastAPI backend.
  - type: web
    name: tradecopilot-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health/core
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: tradecopilot-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: tradecopilot-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: SECRETS_FERNET_KEY
        sync: false           # Set after first deploy: python -c 'from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())'
      - key: AI_COACH_BACKEND
        value: fake            # No worker on free tier — FakeCoach handles requests synchronously.
      - key: KILL_SWITCH_HARD_DAILY_LOSS_PCT
        value: "5.0"
      - key: KILL_SWITCH_HARD_MAX_OPEN_POSITIONS
        value: "20"
      - key: VECTOR_BACKEND
        value: memory
      - key: PARTNER_API_SECRET
        generateValue: true

  # Static frontend (Vite build).
  - type: web
    name: tradecopilot-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://tradecopilot-api.onrender.com/api/:splat
      - type: rewrite
        source: /health/*
        destination: https://tradecopilot-api.onrender.com/health/:splat
      - type: rewrite
        source: /disclaimer
        destination: https://tradecopilot-api.onrender.com/disclaimer
      - type: rewrite        # SPA fallback — must be last.
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    envVars:
      - key: VITE_API_BASE
        value: ""           # Same-origin via the rewrites above.
